services:
  workspace:
    image: mcr.microsoft.com/devcontainers/base:bookworm
    command: sleep infinity
    volumes:
      - ..:/workspaces/Crucible:cached
      - crucible-workspaces-data:/var/lib/crucible/workspaces
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/crucible
      CRUCIBLE_WORKSPACES_ROOT: /var/lib/crucible/workspaces
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_DB: crucible
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crucible
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d crucible']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  crucible-workspaces-data:

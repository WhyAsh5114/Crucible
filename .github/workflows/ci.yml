name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://localhost/dummy'
      - run: bun run format:check
      - run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://localhost/dummy'
      - run: bun run check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://localhost/dummy'
      - name: Cache Hardhat compiler binaries
        id: cache-hardhat
        uses: actions/cache@v5
        with:
          path: ~/.cache/hardhat-nodejs
          key: hardhat-compilers-v2-solc-0.8.28
      - name: Setup Node.js 22 (for Hardhat cache warm-up)
        if: steps.cache-hardhat.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Warm Hardhat compiler cache (Node.js)
        if: steps.cache-hardhat.outputs.cache-hit != 'true'
        working-directory: packages/mcp-compiler
        # Use Node.js 22 (not Bun) — Bun has a known Linux webstreams_adapters
        # crash in Hardhat's fetch-based compiler downloader. Node.js 22 is
        # required for Hardhat 3.x (Iterator.prototype.flatMap, not in Node 20).
        run: node node_modules/.bin/hardhat compile
      - run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crucible
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/crucible'
      - name: Cache Hardhat compiler binaries
        id: cache-hardhat
        uses: actions/cache@v5
        with:
          path: ~/.cache/hardhat-nodejs
          key: hardhat-compilers-v2-solc-0.8.28
      - name: Setup Node.js 22 (for Hardhat cache warm-up)
        if: steps.cache-hardhat.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Warm Hardhat compiler cache (Node.js)
        if: steps.cache-hardhat.outputs.cache-hit != 'true'
        working-directory: packages/mcp-compiler
        run: node node_modules/.bin/hardhat compile
      - name: Run tests
        run: bash scripts/ci-test.sh
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/crucible'
